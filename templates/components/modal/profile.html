<dialog id="profile" class="modal py-3 px-3 rounded-lg">
    <a class="flex items-center justify-between bg-slate-200 py-1 px-2 text-sm font-semibold text-slate-600 rounded-lg shadow-md focus:outline-none focus:shadow-outline-purple" href="#">
        <div class="flex items-center pr-2">
            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path>
            </svg>
            <span>Complete Profile Setup</span>
        </div>
    </a>

    <div class="modal-box">
        <div class="px-4 py-3 my-5 bg-white rounded-lg shadow-md">

            <h1 class="text-2xl text-slate-600 font-semibold text-center uppercase">Profile Setup</h1>

            <div class="flex items-center justify-center py-3">
                <div class="h-20 w-20 rounded-md border border-slate-200">
                    {% if profile.logo %}
                    <img src="{{profile.logo.url}}" alt="logo" class="object-contain" />
                    {% endif %}
                </div>
            </div>

            <form id="form" action="{% url 'settings:complete_profileSetup' %}" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <input type="hidden" value="{{profile.id}}" name="id">

                <!-- Row 1 -->
                <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-4">
                    <label class="block text-sm">
                        <span class="text-gray-700">Logo</span>
                        <input type="file"
                            class="block w-full px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 focus:outline-none focus:shadow-outline-green text-slate-600 form-input shadow-lg"
                            name="{{form.logo.name}}" />
                    </label>
                    <label class="block text-sm">
                        <span class="text-gray-700 dark:text-gray-400">Owner Name</span>
                        <input type="text"
                            class="block w-full px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 focus:outline-none focus:shadow-outline-green text-slate-600 form-input shadow-lg"
                            name="{{form.ownerName.name}}" value="{{profile.ownerName}}" id="on" />
                    </label>
                    <label class="block text-sm">
                        <span class="text-gray-700 dark:text-gray-400">Business Name</span>
                        <input type="text"
                            class="block w-full px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 focus:outline-none focus:shadow-outline-green text-slate-600 form-input shadow-lg"
                            name="{{form.CompanyName.name}}" value="{{profile.CompanyName}}" id="bn" />
                    </label>
                    <label class="block text-sm">
                        <span class="text-gray-700 dark:text-gray-400">Phone / Tel</span>
                        <input type="text"
                            class="block w-full px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 focus:outline-none focus:shadow-outline-green text-slate-600 form-input shadow-lg"
                            name="{{form.phone.name}}" value="{{profile.phone}}" id="tele1" />
                    </label>
                </div>

                <!-- Row 2 -->
                <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-4 mt-5">
                    <label class="block text-sm">
                        <span class="text-gray-700 dark:text-gray-400">Phone 2</span>
                        <input type="text"
                            class="block w-full px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 focus:outline-none focus:shadow-outline-green text-slate-600 form-input shadow-lg"
                            name="{{form.phone2.name}}" value="{{profile.phone2}}" id="tele2" />
                    </label>
                    <label class="block text-sm">
                        <span class="text-gray-700 dark:text-gray-400">Services Description</span>
                        <input type="text"
                            class="block w-full px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 focus:outline-none focus:shadow-outline-green text-slate-600 form-input shadow-lg"
                            name="{{form.services.name}}" value="{{profile.services}}" id="sd" />
                    </label>
                    <label class="block text-sm">
                        <span class="text-gray-700 dark:text-gray-400">Email</span>
                        <input type="text"
                            class="block w-full px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 focus:outline-none focus:shadow-outline-green text-slate-600 form-input shadow-lg"
                            name="{{form.email.name}}" value="{{profile.email}}" id="mail" />
                    </label>
                    <label class="block text-sm">
                        <span class="text-gray-700 dark:text-gray-400">R C (Optional)</span>
                        <input type="text"
                            class="block w-full px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 focus:outline-none focus:shadow-outline-green text-slate-600 form-input shadow-lg"
                            name="{{form.Rc.name}}" value="{{profile.Rc}}" id="rc" />
                    </label>
                </div>

                <!-- Row 3 -->
                <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-4 mt-5">
                    <label class="block text-sm">
                        <span class="text-gray-700 dark:text-gray-400">Sales Interface</span>
                        <select class="block w-full px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 form-select focus:outline-none focus:shadow-outline-green text-slate-600 shadow-lg"
                            name="salesinterface" id="salesinterface" onchange="SalesInterface()">
                            <option value="Basic Sales Point">Basic Sales Point</option>
                            <option value="Sales Point">Sales Point</option>
                        </select>
                    </label>
                    <label class="block text-sm">
                        <span class="text-gray-600">Address</span>
                        <input class="block w-full mt-1 px-2 text-sm form-input border-2 rounded-md focus:border-slate-300 focus:outline-none focus:shadow-outline-green text-slate-600 shadow-lg"
                            name="{{form.address.name}}" value="{{profile.address}}" id="a" />
                    </label>
                    <label class="block text-sm">
                        <span class="text-gray-700 dark:text-gray-400">Select Country</span>
                        <select class="block w-full px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 form-select focus:outline-none focus:shadow-outline-green text-slate-600 shadow-lg" name="country">
                            <option disabled>Select Country</option>
                            {% for value in country %}
                            <option {% if profile.country == value.Country %}selected{% endif %} onclick="AutoCurrency('{{value.Currency}}')">{{value.Country}}</option>
                            {% endfor %}
                        </select>
                    </label>
                    <label class="block text-sm">
                        <span class="text-gray-700 dark:text-gray-400">Select Currency</span>
                        <select id="cu" class="block w-full px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 form-select focus:outline-none focus:shadow-outline-green text-slate-600 shadow-lg" name="currency">
                            {% for currency in country %}
                            <option {% if profile.currency == currency.Currency %}selected{% endif %}>{{currency.Currency}}</option>
                            {% endfor %}
                        </select>
                    </label>
                    <label class="block text-sm">
                        <span class="text-gray-700 dark:text-gray-400">Select Template Preference</span>
                        <select name="pdf_template_preference"
                            class="block w-full px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 focus:outline-none text-slate-600 shadow-lg">
                            <option value="classic" {% if profile.pdf_template_preference == "classic" %}selected{% endif %}>Classic – Minimalist</option>
                            <option value="invoice" {% if profile.pdf_template_preference == "invoice" %}selected{% endif %}>Invoice – Full Details</option>
                        </select>
                    </label>

                    <input type="hidden" value="{{token}}" name="{{form.Token_ID.name}}">
                    <input type="hidden" value="admin" name="{{form.Userlogin.name}}">
                </div>

                <!-- ── Invoice Notification Preferences ───────────────────── -->
                <div class="mt-6 pt-5 border-t-2 border-gray-200">
                    <h3 class="text-sm font-semibold text-gray-700 flex items-center mb-3">
                        <svg class="w-5 h-5 mr-2 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                        </svg>
                        Invoice Notification Preferences
                    </h3>

                    <div class="bg-gray-50 rounded-lg border border-gray-200 divide-y divide-gray-200">

                        <!-- Email toggle -->
                        <div class="flex items-center justify-between px-4 py-3">
                            <div class="flex items-center gap-3">
                                <div class="flex-shrink-0 w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
                                    <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                                    </svg>
                                </div>
                                <div>
                                    <p class="text-sm font-medium text-gray-700">Send Invoice via Email</p>
                                    <p class="text-xs text-gray-400">Auto-email PDF to customer after saving</p>
                                </div>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" name="send_email_invoice" id="modal_send_email_invoice" class="sr-only peer"
                                    {% if profile.send_email_invoice %}checked{% endif %}>
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer
                                            peer-checked:after:translate-x-full peer-checked:after:border-white
                                            after:content-[''] after:absolute after:top-[2px] after:left-[2px]
                                            after:bg-white after:border-gray-300 after:border after:rounded-full
                                            after:h-5 after:w-5 after:transition-all peer-checked:bg-teal-600">
                                </div>
                            </label>
                        </div>

                        <!-- WhatsApp toggle -->
                        <div class="flex items-center justify-between px-4 py-3">
                            <div class="flex items-center gap-3">
                                <div class="flex-shrink-0 w-8 h-8 bg-green-100 rounded-full flex items-center justify-center">
                                    <svg class="w-4 h-4 text-green-600" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                                    </svg>
                                </div>
                                <div>
                                    <p class="text-sm font-medium text-gray-700">Send Invoice via WhatsApp</p>
                                    <p class="text-xs text-gray-400">Auto-send notification to customer via WhatsApp after saving</p>
                                </div>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" name="send_whatsapp_invoice" id="modal_send_whatsapp_invoice" class="sr-only peer"
                                    {% if profile.send_whatsapp_invoice %}checked{% endif %}>
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer
                                            peer-checked:after:translate-x-full peer-checked:after:border-white
                                            after:content-[''] after:absolute after:top-[2px] after:left-[2px]
                                            after:bg-white after:border-gray-300 after:border after:rounded-full
                                            after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500">
                                </div>
                            </label>
                        </div>

                    </div>
                </div>
                <!-- ── End Notification Preferences ────────────────────── -->

                <!-- Setup button -->
                <div class="mt-5">
                    <button type="button" id="btn"
                        class="block w-full h-8 px-4 py-1 mt-4 text-sm font-medium leading-5 text-center text-gray-600 transition-colors duration-150 bg-slate-200 border border-transparent rounded-lg active:bg-slate-300 hover:bg-slate-300 focus:outline-none focus:shadow-outline-slate">
                        Setup
                    </button>
                </div>

            </form>
        </div>
    </div>
</dialog>

<script>
    $("#btn").on('click', function(){
        var on = $("#on").val()
        var sd = $("#sd").val()
        if(on === "" || on === null){
            alert("Owner name is required")
        }
        if(sd === "" || sd === null){
            alert("Services Description is required")
        }
        else{
           $("#form").submit()
        }
    })

    function AutoCurrency(value){
        $("#cu option:selected").text(value)
    }
</script>
