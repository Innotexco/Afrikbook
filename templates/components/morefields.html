<div class="flex justify-end">
    <button class="more-fields block h-8 px-4 py-1 mt-4 text-sm font-medium leading-5 text-center text-gray-600 transition-colors duration-150 bg-slate-200 border border-transparent rounded-lg active:bg-slate-300 hover:bg-slate-300 focus:outline-none focus:shadow-outline-slate"
        type="button">
        More fields
    </button>
</div>

<script>
    // ── More / Less fields toggle ─────────────────────────────────────────────
    $(document).on('click', '.more-fields-btn', function() {
        var $moreFields = $('#more-fields');
        var isHidden    = $moreFields.hasClass('hidden');

        if (isHidden) {
            $moreFields.removeClass('hidden');
            $(this).text('Less Fields');
        } else {
            $moreFields.addClass('hidden');
            $(this).text('More Fields');
        }
    });
</script>
