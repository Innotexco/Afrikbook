<dialog id="my_modal_view_sales_ledger" class="modal py-3 px-3 rounded-lg">

    <a class="flex items-center justify-between bg-slate-200 py-1 px-2 text-sm font-semibold text-slate-600 rounded-lg shadow-md focus:outline-none focus:shadow-outline-purple" href="#">
        <div class="flex items-center">
            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path>
            </svg>
            <span>View Sales Ledger</span>
        </div>
        <span>
            <form method="dialog" class="modal-backdrop">
                <button class="py-1 px-2 rounded-full bg-red-600 text-[14px] text-white font-semibold">X</button>
            </form>
        </span>
    </a>

    <div class="modal-box">
        <div class="px-4 py-3 my-5 bg-white rounded-lg shadow-md">

            <div class="w-full my-5 overflow-hidden rounded-lg shadow-xs">
                <div class="w-full overflow-x-auto table-responsive pdf-page-a4" id="vsl" data-pdf-layout="a4" style="max-width: 210mm; margin: 0 auto;">
                    {% include 'components/Periodheader.html' %}

                    <div id="invoiceHeader"></div>

                    <table id="salesLadgerView" class="display" style="width:100%; max-width:100%; table-layout: fixed;">
                        <thead>
                            <tr class="text-xs font-semibold tracking-wide text-left text-gray-500 bg-gray-50">
                                <th class="px-4 py-3">SN</th>
                                <th class="px-4 py-3">Item</th>
                                <th class="px-4 py-3">Description</th>
                                <th class="px-4 py-3">Qty</th>
                                <th class="px-4 py-3">Unit Price</th>
                                <th class="px-4 py-3">Discount</th>
                                <th class="px-4 py-3 text-right">Amount</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y"></tbody>
                        <tfoot>
                            <tr><td colspan="7" style="padding:4px;"></td></tr>
                            <tr style="background:#f9fafb;">
                                <td colspan="6" style="padding:8px 12px;text-align:right;font-size:11px;color:#6b7280;">Subtotal</td>
                                <td style="padding:8px 12px;font-size:11px;color:#6b7280;text-align:right;" id="modal_subtotal"></td>
                            </tr>
                            <tr style="background:#f9fafb;border-top:2px solid #2F4F4F;">
                                <td colspan="6" style="padding:10px 12px;text-align:right;font-size:12px;font-weight:700;color:#2F4F4F;">Total Amount</td>
                                <td style="padding:10px 12px;font-size:12px;font-weight:700;color:#2F4F4F;text-align:right;">
                                    <b class="currency mr-1"></b><span id="amount_"></span>
                                </td>
                            </tr>
                            <tr id="modal_paid_row" style="display:none;background:#fff;">
                                <td colspan="6" style="padding:8px 12px;text-align:right;color:#6b7280;font-size:11px;">Amount Paid</td>
                                <td style="padding:8px 12px;color:#059669;font-weight:600;font-size:11px;text-align:right;" id="modal_paid"></td>
                            </tr>
                            <tr id="modal_balance_row" style="display:none;background:#fff;">
                                <td colspan="6" style="padding:8px 12px;text-align:right;color:#6b7280;font-size:11px;">Balance Due</td>
                                <td style="padding:8px 12px;color:#dc2626;font-weight:600;font-size:11px;text-align:right;" id="modal_balance"></td>
                            </tr>
                        </tfoot>
                    </table>

                    <hr style="border:none;border-top:1px solid #e5e7eb;margin:16px 0;">
                    <p id="modal_footer" style="font-size:10px;color:#6b7280;padding:0 24px 8px;"></p>

                </div>
            </div>

            <div class="px-4 py-3 my-5 bg-white rounded-lg shadow-md">
                {% include 'modalBoxx/printbtn.html' with container="vsl" table="salesLadgerView" table_no="" %}
            </div>

        </div>
    </div>

</dialog>
