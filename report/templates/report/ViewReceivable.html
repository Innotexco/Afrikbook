<script>
    function updateRemainingBalance() {
        let total = parseFloat($("#total").val()) || 0;
        let paid = parseFloat($("#amount_paid").val()) || 0;
        let discount = parseFloat($("#Discount").val()) || 0;
        let payment = parseFloat($("#payment_amount").val()) || 0;

        let remaining = total - (paid + payment + discount);
        if (remaining < 0) remaining = 0;

        // Update hidden and displayed values
        $("#total-cost").val(remaining.toFixed(2));
        $("#new_balance_display").text("₦" + remaining.toFixed(2));
        $("#total_display").text("₦" + total.toFixed(2));
        $("#paid_display").text("₦" + paid.toFixed(2));
        $("#remaining_display").text("₦" + (total - paid).toFixed(2));

        if (payment <= 0 || payment > (total - paid - discount)) {
            $("#pay").prop('disabled', true);
        } else {
            $("#pay").prop('disabled', false);
        }
    }

    $("#Discount, #payment_amount").on("input", updateRemainingBalance);

    $("#pay").on("click", function() {
        let paymentAmount = parseFloat($("#payment_amount").val()) || 0;
        let discount = parseFloat($("#Discount").val()) || 0;
        let customer = $("#code").text().trim();
        let invoice = $("#invoice").text().trim();

        if (paymentAmount <= 0) {
            alertify.error("Please enter a valid payment amount.");
            return;
        }

        let datas = {
            Discount: discount,
            cost: paymentAmount,
            customer: customer,
            invoice: invoice,
            csrfmiddlewaretoken: $('input[name=csrfmiddlewaretoken]').val()
        };

        $.ajax({
            url: window.location.href,
            method: "POST",
            data: datas,
            success: function(data) {
                if (data.success === true) {
                    alertify.success("Installment payment recorded.");
                    refreshInvoiceData(customer, invoice);
                    if (typeof Filter === 'function') Filter();
                } else {
                    let errorMsg = data.error || "Transaction unsuccessful.";
                    alertify.error(errorMsg);
                    $("#x").click();
                }
            },
            error: function(xhr) {
                let errorMsg = "Server error. Please try again.";
                if (xhr.responseJSON && xhr.responseJSON.error) {
                    errorMsg = xhr.responseJSON.error;
                }
                alertify.error(errorMsg);
            }
        });
    });

    function refreshInvoiceData(customerId, invoiceId) {
        $.ajax({
            url: "/get-invoice-details/",
            data: { customer: customerId, invoice: invoiceId },
            success: function(res) {
                if (res.success) {
                    $("#total").val(res.total);
                    $("#amount_paid").val(res.amount_paid);
                    $("#total-cost").val(res.balance);
                    $("#payment_amount").val(0);
                    $("#Discount").val(0);
                    updateRemainingBalance();
                } else {
                    location.reload();
                }
            },
            error: function() {
                location.reload();
            }
        });
    }

    // Update display when modal is populated (called from showModal)
    function refreshModalDisplay() {
        let total = parseFloat($("#total").val()) || 0;
        let paid = parseFloat($("#amount_paid").val()) || 0;
        updateRemainingBalance();
    }
</script>
