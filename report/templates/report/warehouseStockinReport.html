{% extends 'base.html' %}

{% block content %}

<a class="flex items-center justify-between bg-slate-200 py-1 px-2 text-sm font-semibold text-slate-600 rounded-lg shadow-md focus:outline-none focus:shadow-outline-purple"
   href="#">
    <div class="flex items-center">
        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
        <span>Warehouse Stockin Report</span>
    </div>
    <span>Home &RightArrow;</span>
</a>

<div class="px-4 my-5 bg-white rounded-lg shadow-md">
    <div class="grid grid-cols-2 gap-4">
        <div class="col-span-1 p-2 border-r">
            <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
                <label class="block text-sm hidden" id="dailyDate">
                    <span class="text-gray-700">From Date</span>
                    <input type="date" class="onchangeClass block w-full py-2 px-2 text-sm border-2 rounded-md focus:border-slate-300 focus:outline-none focus:shadow-outline-green text-slate-600 form-input"
                           id="fromdate"/>
                </label>

                <label class="block text-sm hidden" id="durationFrmDate">
                    <span class="text-gray-700">To Date</span>
                    <input type="date" class="onchangeClass block w-full py-2 px-2 text-sm border-2 rounded-md focus:border-slate-300 focus:outline-none focus:shadow-outline-green text-slate-600 form-input"
                           id="todate"/>
                </label>

                <label class="block text-sm hidden monthly">
                    <span class="text-gray-700">Select Month</span>
                    <select class="onchangeM_Y block w-full py-2 px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 form-select focus:outline-none focus:shadow-outline-green text-slate-600 shadow-lg" id="monthly">
                        <option>_ _Choose Month_ _</option>
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03">March</option>
                        <option value="04">April</option>
                        <option value="05">May</option>
                        <option value="06">June</option>
                        <option value="07">July</option>
                        <option value="08">August</option>
                        <option value="09">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                </label>

                <label class="block text-sm hidden Quaterly">
                    <span class="text-gray-700">Select Months</span>
                    <select class="onchangeQuaterly block w-full py-2 px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 form-select focus:outline-none focus:shadow-outline-green text-slate-600 shadow-lg" id="Quaterly">
                        <option>_ _Choose Months_ _</option>
                        <option value="01-04">January - April</option>
                        <option value="05-08">May - August</option>
                        <option value="09-12">September - December</option>
                    </select>
                </label>

                <label class="block text-sm hidden Yearly">
                    <span class="text-gray-700">Select Year</span>
                    <select class="onchangeM_Y block w-full py-2 px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 form-select focus:outline-none focus:shadow-outline-green text-slate-600 shadow-lg" id="Yearly">
                        <option>_ _Choose Year_ _</option>
                    </select>
                </label>

                <div class="block text-sm mt-5">
                    <button type='button' id="search_btn" class="hidden Search w-full py-2 px-2 mt-1 text-sm font-medium leading-5 text-center text-gray-600 transition-colors duration-150 bg-slate-200 border border-transparent rounded-lg active:bg-slate-300 hover:bg-slate-300 focus:outline-none focus:shadow-outline-slate">
                        Search Date
                    </button>
                </div>
            </div>
        </div>

        <div class="col-span-1">
            <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
                <input type="hidden" id="daily">
                <label class="block text-sm">
                    <span class="text-gray-700">Select Period</span>
                    <select class="commonClass block w-full py-2 px-2 mt-1 text-sm border-2 rounded-md focus:border-slate-300 form-select focus:outline-none focus:shadow-outline-green text-slate-600 shadow-lg" id="duration">
                        <option>_ _Choose period_ _</option>
                        <option>Daily</option>
                        <option>Monthly</option>
                        <option>Quaterly</option>
                        <option>Yearly</option>
                    </select>
                </label>
            </div>
        </div>
    </div>
</div>

<div class="w-full my-5 overflow-hidden rounded-lg shadow-xs">
    <div class="w-full overflow-x-auto table-responsive" id="stock">
        <table id="storestocklevel" style="width:100%">
            <thead id="thead"></thead>
            <tbody class="bg-white divide-y result"></tbody>
        </table>
    </div>
</div>

<div class="grid grid-cols-2 gap-4">
    <div class="col-span-1 p-2">
        <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
            <button onclick="testPrint()">Test Print</button>

            <button type="button" class="block w-full px-4 py-1 mt-4 text-sm font-medium leading-5 text-center text-gray-600 transition-colors duration-150 bg-slate-200 border border-transparent rounded-lg active:bg-slate-300 hover:bg-slate-300 focus:outline-none focus:shadow-outline-slate"
                    onclick="convertTableToExcel('stock', 'storestocklevel')">
                Export to Excel
            </button>
        </div>
    </div>
</div>

<script>
function testPrint() {
    window.print();
}
</script>

<script>
    $(document).on('change', '#duration', function() {
        var duration = $(this).val();
        $('#search_btn').addClass('hidden');

        switch (duration) {
            case 'Daily':
                $('#durationFrmDate').removeClass('hidden');
                $('#dailyDate').removeClass('hidden');
                $('.monthly').addClass('hidden');
                $('.Quaterly').addClass('hidden');
                $('.Yearly').addClass('hidden');
                $('#daily').val('daily');
                break;
            case 'Monthly':
                $('#daily').val('monthly');
                $('#durationFrmDate').addClass('hidden');
                $('#dailyDate').addClass('hidden');
                $('.monthly').removeClass('hidden');
                $('.Quaterly').addClass('hidden');
                $('.Yearly').removeClass('hidden');
                break;
            case 'Quaterly':
                $('#daily').val('quaterly');
                $('#durationFrmDate').addClass('hidden');
                $('#dailyDate').addClass('hidden');
                $('.monthly').addClass('hidden');
                $('.Quaterly').removeClass('hidden');
                $('.Yearly').removeClass('hidden');
                break;
            case 'Yearly':
                $('#daily').val('');
                $('#durationFrmDate').addClass('hidden');
                $('#dailyDate').addClass('hidden');
                $('.monthly').addClass('hidden');
                $('.Quaterly').addClass('hidden');
                $('.Yearly').removeClass('hidden');
                break;
            default:
                $('#durationFrmDate').addClass('hidden');
                $('#dailyDate').addClass('hidden');
                $('.monthly').addClass('hidden');
                $('.Quaterly').addClass('hidden');
                $('.Yearly').addClass('hidden');
                alert('Please select a valid period');
                break;
        }
    });

    $(document).on('change', '.onchangeClass', function() {
        var date1 = $('#fromdate').val();
        var date2 = $('#todate').val();
        if (date1 !== '' && date2 !== '') {
            $('#search_btn').removeClass('hidden');
        } else {
            $('#search_btn').addClass('hidden');
        }
    });

    $(document).on('change', '.onchangeM_Y', function() {
        var monthly = $('#monthly').val();
        var Yearly = $('#Yearly').val();
        if (Yearly !== '_ _Choose Year_ _' && monthly !== '_ _Choose Month_ _') {
            $('#search_btn').removeClass('hidden');
        } else {
            $('#search_btn').addClass('hidden');
        }
    });

    $(document).on('change', '.onchangeQuaterly', function() {
        var Quaterly = $('#Quaterly').val();
        var Yearly = $('#Yearly').val();
        if (Yearly !== '_ _Choose Year_ _' && Quaterly !== '_ _Choose Months_ _') {
            $('#search_btn').removeClass('hidden');
        } else {
            $('#search_btn').addClass('hidden');
        }
    });

    $(document).on('change', '#Yearly', function() {
        var Yearly = $('#Yearly').val();
        if (Yearly !== '_ _Choose Year_ _') {
            $('#search_btn').removeClass('hidden');
        } else {
            $('#search_btn').addClass('hidden');
        }
    });

    $(document).ready(function() {
        // Populate years dropdown
        (function populateYears() {
            var currentYear = new Date().getFullYear();
            var startYear = {{ start_year|default:2020 }};
            var $select = $('#Yearly');
            $select.empty();
            $select.append('<option>_ _Choose Year_ _</option>');
            for (var year = currentYear; year >= startYear; year--) {
                $select.append('<option value="' + year + '">' + year + '</option>');
            }
        })();

        // Search button click
        $(document).on('click', '.Search', function() {
            var fromdate = $('#fromdate').val();
            var todate = $('#todate').val();
            var monthly = $('#monthly').val();
            var Yearly = $('#Yearly').val();
            var Quaterly = $('#Quaterly').val();
            var daily = $('#daily').val();

            $.ajax({
                type: 'GET',
                url: '{% url "report:WarehouseStockinReport" %}',
                data: {
                    monthly: monthly,
                    Yearly: Yearly,
                    Quaterly: Quaterly,
                    daily: daily,
                    fromdate: fromdate,
                    todate: todate,
                },
                success: function(res) {
                    if (res.error) {
                        alert(res.error);
                    } else {
                        $('#storestocklevel .result').empty();
                        $('#thead').empty();

                        // Build header
                        var headerRow = $('<tr class="text-xs font-semibold tracking-wide text-left text-gray-500 bg-gray-50">');
                        headerRow.append('<th class="py-3">Items</th>');
                        headerRow.append('<th class="py-3">Period</th>');
                        headerRow.append('<th class="py-3">Current Stock Level</th>');
                        $('#thead').append(headerRow);

                        // Build data rows
                        res.data.forEach(function(item) {
                            var dataRow = $('<tr>');
                            dataRow.append('<td class="py-3">' + item.item + '</td>');
                            dataRow.append('<td class="py-3">' + item.period + '</td>');
                            dataRow.append('<td class="py-3">' + item.report + '</td>');
                            $('#storestocklevel .result').append(dataRow);
                        });
                    }
                }
            });
        });
    });
</script>

{% endblock %}
