<dialog id="my_modal_manage_category" class="modal py-3 px-3 rounded-lg">
    <a class="flex items-center justify-between bg-slate-200 py-1 px-2 text-sm font-semibold text-slate-600 rounded-lg shadow-md focus:outline-none focus:shadow-outline-purple"
      href="#">
        <div class="flex items-center">
            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path>
            </svg>
            <span>Manage Category & Subcategories</span>
        </div>
        <span>
            <form method="dialog" class="modal-backdrop">
                <button class="py-1 px-2 rounded-full bg-red-600 text-[14px] text-white font-semibold" id="x">X</button>
            </form>
        </span>
    </a>

    <div class="modal-box w-11/12 max-w-4xl">
        
        <!-- Category Details Header -->
        <div class="px-4 py-4 bg-slate-50 rounded-lg mb-4 border border-slate-200">
            <div class="flex gap-6 items-start">
                <!-- Category Image -->
                <div id="cat_img_info" class="flex-shrink-0">
                    <div class="w-24 h-24 rounded-lg shadow-md bg-gray-200 flex items-center justify-center">
                        <svg class="w-12 h-12 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"></path>
                        </svg>
                    </div>
                </div>

                <!-- Category Info -->
                <div class="flex-grow">
                    <div class="mb-4">
                        <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Category Name</p>
                        <h3 class="text-2xl font-bold text-gray-900" id="category_name_info">-</h3>
                    </div>
                    <div class="mb-4">
                        <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Description</p>
                        <p class="text-sm text-gray-700" id="desc">-</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openAddSubcategoryModal()" 
                            class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition">
                            + Add Subcategory
                        </button>
                        <button onclick="deleteCategory()" 
                            class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium transition">
                            Delete Category
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Subcategories Section -->
        <div>
            <h4 class="text-lg font-bold text-gray-900 mb-4">Subcategories</h4>
            
            <div id="subcategoriesList" class="space-y-2">
                <p class="text-center text-gray-500 py-4">Loading...</p>
            </div>
        </div>

    </div>

    <!-- Subcategory Management Modal (nested inside) -->
    <dialog id="my_modal_subcategory_form" class="modal">
        <div class="modal-box w-11/12 max-w-md">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            
            <h3 class="font-bold text-lg mb-4" id="subcategory_form_title">Add Subcategory</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Subcategory Name *</label>
                    <input type="text" id="sub_name" placeholder="Enter subcategory name"
                        class="w-full px-3 py-2 border-2 border-gray-300 rounded-md focus:border-blue-500 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea id="sub_description" placeholder="Enter description"
                        class="w-full px-3 py-2 border-2 border-gray-300 rounded-md focus:border-blue-500 focus:outline-none resize-none"></textarea>
                </div>

                <div class="flex justify-end gap-2 pt-4">
                    <button type="button" onclick="my_modal_subcategory_form.close()"
                        class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg font-medium">
                        Cancel
                    </button>
                    <button type="button" onclick="saveSubcategory()"
                        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium">
                        Save
                    </button>
                </div>
            </div>
        </div>
    </dialog>

</dialog>

<script>
let currentCategoryId = null;
let currentSubcategoryId = null;

function fetchSubcategories(id) {
    currentCategoryId = id;
    var subcategoriesList = document.getElementById('subcategoriesList');
    
    subcategoriesList.innerHTML = '<p class="text-center text-gray-500 py-4">Loading...</p>';
    
    fetch(`/category-details/${id}/`)
        .then(response => response.json())
        .then(data => {
            // Update category information
            document.getElementById('category_name_info').innerHTML = data.category.category_name || 'N/A';
            document.getElementById('desc').innerHTML = data.category.description || 'No description available';
            
            // Handle category image
            const catImgInfo = document.getElementById('cat_img_info');
            if (data.category.cat_img) {
                catImgInfo.innerHTML = `
                    <img class="w-24 h-24 rounded-lg shadow-md object-cover" 
                         src="${data.category.cat_img}" 
                         alt="${data.category.category_name} Image"
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23f3f4f6%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%236b7280%22 font-family=%22Arial%22 font-size=%2214%22%3ENo Image%3C/text%3E%3C/svg%3E';" />
                `;
            }
            
            // Display subcategories
            subcategoriesList.innerHTML = '';
            if (data.category.subcategories && data.category.subcategories.length > 0) {
                data.category.subcategories.forEach(sub => {
                    const subDiv = document.createElement('div');
                    subDiv.className = 'flex justify-between items-center p-4 bg-white border border-slate-200 rounded-lg hover:shadow-md transition';
                    subDiv.innerHTML = `
                        <div>
                            <p class="font-medium text-gray-900">${sub.name}</p>
                            ${sub.description ? `<p class="text-xs text-gray-500 mt-1">${sub.description}</p>` : ''}
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editSubcategory(${sub.id})" 
                                class="px-3 py-1 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded text-sm font-medium transition">
                                Edit
                            </button>
                            <button onclick="deleteSubcategory(${sub.id})" 
                                class="px-3 py-1 bg-red-100 hover:bg-red-200 text-red-700 rounded text-sm font-medium transition">
                                Delete
                            </button>
                        </div>
                    `;
                    subcategoriesList.appendChild(subDiv);
                });
            } else {
                subcategoriesList.innerHTML = '<p class="text-center text-gray-500 py-8">No subcategories yet. Add one to get started.</p>';
            }
            
            my_modal_manage_category.showModal();
        })
        .catch(error => {
            console.error('Error:', error);
            subcategoriesList.innerHTML = '<p class="text-red-500 text-center py-4">Error loading category details</p>';
            my_modal_manage_category.showModal();
        });
}

function openAddSubcategoryModal() {
    currentSubcategoryId = null;
    document.getElementById('subcategory_form_title').textContent = 'Add Subcategory';
    document.getElementById('sub_name').value = '';
    document.getElementById('sub_description').value = '';
    my_modal_subcategory_form.showModal();
}

function editSubcategory(id) {
    currentSubcategoryId = id;
    
    fetch(`/subcategory-edit/${id}/`)
        .then(response => response.json())
        .then(data => {
            document.getElementById('subcategory_form_title').textContent = 'Edit Subcategory';
            document.getElementById('sub_name').value = data.name;
            document.getElementById('sub_description').value = data.description || '';
            my_modal_subcategory_form.showModal();
        })
        .catch(error => {
            console.error('Error:', error);
            alertify.error('Error loading subcategory');
        });
}

function saveSubcategory() {
    const subName = document.getElementById('sub_name').value.trim();
    const subDesc = document.getElementById('sub_description').value.trim();
    
    if (!subName) {
        alertify.error('Subcategory name is required');
        return;
    }
    
    const url = currentSubcategoryId 
        ? `/subcategory-update/${currentSubcategoryId}/`
        : '/subcategory-create/';
    
    const data = {
        category_id: currentCategoryId,
        name: subName,
        description: subDesc
    };
    
    fetch(url, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        if (result.success) {
            my_modal_subcategory_form.close();
            fetchSubcategories(currentCategoryId);
            alertify.success(currentSubcategoryId ? 'Subcategory updated' : 'Subcategory added');
        } else {
            alertify.error('Error: ' + result.message);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alertify.error('Error saving subcategory');
    });
}

function deleteSubcategory(id) {
    alertify.confirm('Delete Subcategory', 'Are you sure you want to delete this subcategory?', 
        function() {
            fetch(`/subcategory-delete/${id}/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                }
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    fetchSubcategories(currentCategoryId);
                    alertify.success('Subcategory deleted');
                } else {
                    alertify.error('Cannot delete: ' + result.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alertify.error('Error deleting subcategory');
            });
        },
        function() {}
    );
}

function deleteCategory() {
    alertify.confirm('Delete Category', 'Are you sure you want to delete this category? This action cannot be undone.', 
        function() {
            fetch(`/category-delete/${currentCategoryId}/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                }
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    my_modal_manage_category.close();
                    location.reload();
                } else {
                    alertify.error('Cannot delete: ' + result.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alertify.error('Error deleting category');
            });
        },
        function() {}
    );
}
</script>
